<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pool Cleaning in St. Petersburg, FL — Done Right, Every Week</title>
    <meta name="description" content="Flat-rate weekly pool cleaning in St. Petersburg and the Tampa Bay area. One price covers standard chemicals, the same tech shows up every week, and you get a photo report after every visit." />
    <meta name="theme-color" content="#0a1628" />
    <link rel="canonical" href="https://suncoastpoolpros.com/" />
    <link rel="icon" type="image/svg+xml" href="/circle-icon.svg" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "@id": "https://suncoastpoolpros.com/#business",
        "name": "Suncoast Pool Pros",
        "url": "https://suncoastpoolpros.com/",
        "image": "https://suncoastpoolpros.com/logo.svg",
        "telephone": "+1-727-295-3621",
        "email": "Suncoastpoolpros@gmail.com",
        "priceRange": "$$",
        "sameAs": ["https://www.yelp.com/biz/suncoast-pool-pros-st-petersburg"],
        "makesOffer": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Residential Pool Cleaning",
              "description": "Flat-rate weekly pool cleaning and standard chemical balancing for homes in St. Petersburg and the Tampa Bay area."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Commercial & HOA Pool Service",
              "description": "Weekly pool service for HOAs, condos, apartments, and hotels, including health-code chemical logs and documentation."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Pool Equipment Repair",
              "description": "Pump, filter, heater, and equipment repair and replacement, quoted before any work."
            }
          }
        ],
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "1701 Central Ave, Unit 279",
          "addressLocality": "St. Petersburg",
          "addressRegion": "FL",
          "postalCode": "33713",
          "addressCountry": "US"
        },
        "areaServed": [
          { "@type": "City", "name": "St. Petersburg" },
          { "@type": "City", "name": "Clearwater" },
          { "@type": "City", "name": "Seminole" },
          { "@type": "City", "name": "Largo" },
          { "@type": "City", "name": "Gulfport" },
          { "@type": "City", "name": "Tampa" },
          { "@type": "AdministrativeArea", "name": "Pinellas County" }
        ],
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
            "opens": "08:00",
            "closes": "18:00"
          }
        ]
      }
    </script>

    <!-- Preload the fonts used above the fold (Montserrat headings + Inter body)
         so they start downloading the moment HTML arrives, in parallel with the
         CSS. Without these the browser only learns about them after CSS parses. -->
    <!-- Default above-the-fold font set, used by content pages (nav + text H1):
         Inter 600 (nav/semibold), Montserrat 700 (nav/headings display), Inter
         400 (body). Hero pages override this set per-route via
         usePageMeta({ fontPreload }) in scripts/prerender.mjs (e.g. adding
         Montserrat 900 for the big headline, or Caveat on the homepage). -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-600.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/montserrat-700.woff2" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-400.woff2" crossorigin />

    <!-- Hero image preloads are injected per-page by scripts/prerender.mjs from
         each route's usePageMeta({ heroPreload }) — so a page only preloads the
         hero it actually paints (and content pages preload no hero at all). -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
