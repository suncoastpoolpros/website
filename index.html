<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Pool Cleaning in St. Petersburg, FL — Done Right, Every Week</title>
    <meta name="description" content="Flat-rate weekly pool cleaning in St. Petersburg and the Tampa Bay area. One price covers standard chemicals, the same tech shows up every week, and you get a photo report after every visit." />

    <link rel="canonical" href="https://suncoastpoolpros.com/" />

    <script type="application/ld+json">

        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "@id": "https://suncoastpoolpros.com/#business",
        "name": "Suncoast Pool Pros",
        "url": "https://suncoastpoolpros.com/",
        "image": "https://suncoastpoolpros.com/logo.svg",
        "telephone": "+1-727-295-3621",
        "email": "Suncoastpoolpros@gmail.com",
        "priceRange": "$$",
        "sameAs": ["https://www.yelp.com/biz/suncoast-pool-pros-st-petersburg"],
        "makesOffer": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Residential Pool Cleaning",
              "description": "Flat-rate weekly pool cleaning and standard chemical balancing for homes in St. Petersburg and the Tampa Bay area."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Commercial & HOA Pool Service",
              "description": "Weekly pool service for HOAs, condos, apartments, and hotels, including health-code chemical logs and documentation."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Pool Equipment Repair",
              "description": "Pump, filter, heater, and equipment repair and replacement, quoted before any work."
            }
          }
        ],
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "1701 Central Ave, Unit 279",
          "addressLocality": "St. Petersburg",
          "addressRegion": "FL",
          "postalCode": "33713",

        },
        "areaServed": [
          { "@type": "City", "name": "St. Petersburg" },
          { "@type": "City", "name": "Clearwater" },
          { "@type": "City", "name": "Seminole" },
          { "@type": "City", "name": "Largo" },
          { "@type": "City", "name": "Gulfport" },
          { "@type": "City", "name": "Tampa" },
          { "@type": "AdministrativeArea", "name": "Pinellas County" }
        ],
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
            "opens": "08:00",
            "closes": "18:00"
          }
        ]
